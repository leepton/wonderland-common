Tweaker.setScriptStage("BIOME_REGISTRY")
Tweaker.setPlacementStage("POST_ORES")

Tweaker.createBiome("beta_swampland_plus", "modernbetaforge:beta_swampland")
swampland = forBiomes("biometweaker:beta_swampland_plus")

mushroomDec = newClusterDecoration()
mushroomDec.addSoilBlock("minecraft:grass")
mushroomDec.set("mainBlock", "minecraft:brown_mushroom")
mushroomDec.set("count", 15)
mushroomDec.set("radius", 5)
mushroomDec.set("height", 20)

treeDec = newTreeDecoration()
treeDec.set("minHeight", 6)
treeDec.set("growVines", true)
treeDec.set("count", 3)

swampland.addDecoration(mushroomDec)
swampland.addDecoration(treeDec)